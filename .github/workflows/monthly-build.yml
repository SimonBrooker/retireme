name: Monthly rebuild

# Rebuilds the current code on a fresh base image once a month so the published
# :latest image picks up security patches and dependency fixes (requirements.txt
# uses version ranges, and the Alpine base gets OS updates). It does NOT bump the
# version or cut a release — it just refreshes :latest. A smoke test runs before
# anything is pushed, so a broken dependency bump can't auto-publish.
#
# Setup required (one-time):
#   - Repo Settings -> Secrets and variables -> Actions:
#       DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  (a Docker Hub personal access token)
#   - ghcr.io uses the built-in GITHUB_TOKEN (packages: write below).

on:
  schedule:
    - cron: "0 4 1 * *"   # 04:00 UTC on the 1st of each month
  workflow_dispatch: {}    # allow manual runs from the Actions tab

concurrency:
  group: monthly-build
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to ghcr.io via GITHUB_TOKEN

    env:
      DOCKERHUB_IMAGE: simonbrooker/retireme
      GHCR_IMAGE: ghcr.io/simonbrooker/retireme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (fresh base, load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true            # load into the local daemon so we can smoke-test
          pull: true            # re-fetch the base image, don't use a cached one
          tags: retireme:ci

      - name: Smoke test — boot and serve
        run: |
          docker run -d --name smoke -p 5000:5000 \
            -e SECRET_KEY=ci-smoke-test-key-not-a-real-secret retireme:ci
          ok=""
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -L http://localhost:5000/ || true)
            if [ "$code" = "200" ]; then ok="yes"; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "::error::Smoke test failed — container did not serve HTTP 200. Not pushing."
            docker logs smoke || true
            exit 1
          fi
          echo "Smoke test passed."
          docker rm -f smoke

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push :latest to both registries
        run: |
          docker tag retireme:ci "$DOCKERHUB_IMAGE:latest"
          docker tag retireme:ci "$GHCR_IMAGE:latest"
          docker push "$DOCKERHUB_IMAGE:latest"
          docker push "$GHCR_IMAGE:latest"
          echo "Pushed $DOCKERHUB_IMAGE:latest and $GHCR_IMAGE:latest"
